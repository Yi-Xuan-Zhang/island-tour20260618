<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>島嶼旅跡 - 預訂成功</title>
    <link rel="stylesheet" href="css/step-3.css">
</head>

<body>

    <header
        style="background: var(--brand-primary); color: white; padding: 20px; text-align: center; font-weight: bold;">
        【導覽列預留區塊】
    </header>

    <div class="booking-container">

        <section class="progress-bar">
            <div class="step completed">
                <div class="step-circle">✓</div>
                <div class="step-label">選擇日期</div>
            </div>
            <div class="step-line active"></div>
            <div class="step completed">
                <div class="step-circle">✓</div>
                <div class="step-label">填寫資料</div>
            </div>
            <div class="step-line active"></div>
            <div class="step active">
                <div class="step-circle">3</div>
                <div class="step-label">預訂完成</div>
            </div>
        </section>

        <div class="success-content">

            <div class="success-icon">✓</div>

            <h1 class="main-title">預訂成功！出發準備好了嗎？</h1>
            <p class="sub-title">確認信已寄送至您的信箱，請記得在出發前查閱。</p>

            <div class="order-card">
                <div class="order-header">
                    <h3>訂單詳情</h3>
                    <span class="order-tag">ITMQHTNFIA</span>
                </div>

                <ul class="order-info-list">
                    <li><span class="label">體驗名稱</span><span class="value">清水斷崖獨木舟探險</span></li>
                    <li><span class="label">目的地</span><span class="value">花蓮</span></li>
                    <li><span class="label">體驗日期</span><span class="value">2026-06-17</span></li>
                    <li><span class="label">場次</span><span class="value">上午場 09:00</span></li>
                    <li><span class="label">聯絡人</span><span class="value">旅客姓名</span></li>
                </ul>

                <div class="total-row">
                    <span class="total-label">已付總金額</span>
                    <span class="total-price">NT$ 1,800</span>
                </div>
            </div>

            <div class="action-btns">
                <a href="page1.html" class="btn btn-outline">← 返回首頁</a>
                <a href="#" class="btn btn-primary">查看我的訂單</a>
            </div>
        </div>

    </div>

    <footer style="background: #111E33; color: #888; padding: 40px; text-align: center; margin-top: 60px;">
        【頁尾預留區塊】
        </header>

        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

        <script src="js/step-3.js"></script>
</body>

</html>
